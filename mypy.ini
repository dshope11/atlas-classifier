[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True

# conda strips py.typed from these packages; suppress the resulting noise.
# These libraries have full annotations in their pip-installed forms — the
# issue is packaging, not the libraries themselves.
[mypy-h5py.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-awkward.*]
ignore_missing_imports = True

[mypy-uproot.*]
ignore_missing_imports = True

[mypy-atlasopenmagic.*]
ignore_missing_imports = True
